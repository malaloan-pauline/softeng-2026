<!DOCTYPE html>

<html>

<head> 
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" > <!-- the display adapt to the screen size and first load with 100% zoo initialy -->
    <title>Tict'IT</title>  <!-- tictactoe version IT -->

    <link rel="stylesheet" href="tictactoe.css"> <!-- piont to external css file -->
    <!-- 
         i use "defer" so that .js loads last and doesn't delay the loading of html and css.
        i could put it last in the body but it won't be clean for me at least
    --> 
    <script src="tictactoe.js" defer></script> <!-- point to external css file -->   

</head>


    <body>

        <h1>Tict'IT</h1> <!-- main title -->
        <hr>
        <p>Welcome to the tictactoe game version IT ! </p>

        
            
        <br>

        <div id="game-board-3x3">
                <div data-cell-index="0" class="game-cell"> </div>
                <div data-cell-index="1" class="game-cell"> </div>
                <div data-cell-index="2" class="game-cell"> </div>
                <div data-cell-index="3" class="game-cell"> </div>
                <div data-cell-index="4" class="game-cell"> </div>
                <div data-cell-index="5" class="game-cell"> </div>
                <div data-cell-index="6" class="game-cell"> </div>
                <div data-cell-index="7" class="game-cell"> </div>
                <div data-cell-index="8" class="game-cell"> </div>
        </div>


         <button id="restart-game-button">Restart Game</button>

         

    </body>


</html>
