<!Doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Pauline Aquilina Malalo-an"> </meta>
        <title>Clicker Game</title>
        <link rel="stylesheet" href="./style.css">
        <script src="./index.js" defer></script>
    </head>

    <body>
        <div class="container">
            <main>
                <div class="clicker game"> 
                    <button id="clicker-btn"> Bleh! </button>
                </div>
                <div class="score">

                </div>
                <div class="upgrades">
                    <h3> Upgrades </h3>
                    <div class="upgrade" id="upgrade1">
                        <p> Upgrade 1 </p>
                        <button id="upgrade1-btn"> Buy </button>
                    </div>
                    <div class="upgrade" id="upgrade2">
                        <p> Upgrade 2 </p>
                        <button id="upgrade2-btn"> Buy </button>
                    </div>
                </div>
                <div class="builds">
                    <h3> Builds </h3>
                    <div class="build" id="build1">
                        <p> Build 1 </p>
                        <button id="build1-btn"> Buy </button>
                    </div>
                    <div class="build" id="build2">
                        <p> Build 2 </p>
                        <button id="build2-btn"> Buy </button>
                    </div>
                </div>
            </main>
            <div id="footer">
                <footer>   
                <p> Copyrights &copy; 2026 Clicker Game by Match IT</p>
                </footer>
            </div>
        </div>
    </body>

</html>
